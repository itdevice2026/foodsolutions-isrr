<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FOODSOLUTIONS IS-RR SYSTEM</title>
<style>
:root{
  --brand:#0f766e; --brand-dark:#115e59; --brand-light:#ccfbf1;
  --accent:#ea580c; --bg:#f1f5f9; --card:#ffffff; --line:#e2e8f0;
  --text:#0f172a; --muted:#64748b; --danger:#dc2626; --ok:#16a34a;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--brand)}
.hidden{display:none!important}

/* ---------- Login ---------- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--brand-dark),var(--brand) 60%,var(--accent))}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:360px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.login-card h1{margin:0;font-size:20px;color:var(--brand-dark);text-align:center}
.login-card .sub{text-align:center;color:var(--muted);margin:4px 0 24px;font-size:12px;letter-spacing:.5px}

.brand-logo-box{background:#fff;border-radius:7px;padding:4px 10px;display:inline-flex;align-items:center}
.brand-logo-box svg{height:24px;width:auto;display:block}
.hdr-sub{color:#fff;font-weight:700;font-size:14px;letter-spacing:1px;margin-left:6px}
#loginLogo{margin:0 auto 12px;max-width:250px}
#loginLogo svg{width:100%;height:auto;display:block}
.brand-badge{width:64px;height:64px;border-radius:14px;background:var(--brand);color:#fff;display:flex;
  align-items:center;justify-content:center;font-weight:700;font-size:24px;margin:0 auto 14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;outline:none}
.field input:focus{border-color:var(--brand)}
.btn{background:var(--brand);color:#fff;border:none;padding:11px 16px;border-radius:9px;font-weight:600;width:100%}
.btn:hover{background:var(--brand-dark)}
.btn.sm{width:auto;padding:7px 13px;font-size:13px}
.btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
.btn.ghost:hover{background:var(--brand-light)}
.btn.gray{background:#e2e8f0;color:var(--text)}.btn.gray:hover{background:#cbd5e1}
.btn.danger{background:var(--danger)}.btn.danger:hover{background:#b91c1c}
.btn.accent{background:var(--accent)}.btn.accent:hover{background:#c2410c}
.err{color:var(--danger);font-size:13px;margin-top:10px;text-align:center;min-height:18px}

/* ---------- App shell ---------- */
#app{min-height:100vh}
header.top{background:var(--brand-dark);color:#fff;display:flex;align-items:center;padding:0 18px;height:56px;position:sticky;top:0;z-index:50}
header.top .logo{font-weight:700;font-size:16px;display:flex;align-items:center;gap:10px}
header.top .logo .mk{background:var(--accent);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
nav.tabs{display:flex;gap:4px;margin-left:18px;flex:1 1 auto;min-width:0;flex-wrap:nowrap;overflow-x:auto}
nav.tabs::-webkit-scrollbar{height:0}
nav.tabs button{background:transparent;border:none;color:#bae6e0;padding:7px 11px;border-radius:7px;font-weight:600;font-size:13px;white-space:nowrap;flex:0 0 auto}
nav.tabs button:hover{background:rgba(255,255,255,.12);color:#fff}
nav.tabs button.active{background:#fff;color:var(--brand-dark)}
.userbox{display:flex;align-items:center;gap:12px;font-size:13px}
.userbox .role{background:rgba(255,255,255,.18);padding:3px 9px;border-radius:20px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
main{padding:22px;max-width:1240px;margin:0 auto}

.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-head h2{margin:0;font-size:20px;color:var(--brand-dark)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{padding:9px 12px;border:1px solid var(--line);border-radius:8px;min-width:220px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px}
.stat .n{font-size:28px;font-weight:700;color:var(--brand-dark)}
.stat .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.stat.accent .n{color:var(--accent)}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
.card h3{margin:0 0 14px;font-size:15px;color:var(--brand-dark)}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
th{background:#f8fafc;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
tbody tr:hover{background:#f8fafc}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill.green{background:#dcfce7;color:#166534}.pill.orange{background:#ffedd5;color:#9a3412}
.pill.blue{background:#dbeafe;color:#1e40af}.pill.red{background:#fee2e2;color:#991b1b}
.muted{color:var(--muted)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.row-actions{display:flex;gap:6px}
.iconbtn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;font-size:12px;color:var(--text)}
.iconbtn:hover{background:#f1f5f9}
.iconbtn.del:hover{background:#fee2e2;color:var(--danger);border-color:#fca5a5}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:24px;overflow:auto}
.modal.wide{max-width:1180px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:920px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal .m-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal .m-head h3{margin:0;color:var(--brand-dark)}
.modal .m-body{padding:20px}
.modal .m-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.fld label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--brand)}
.lines th,.lines td{padding:6px 6px}
.lines input,.lines select{width:100%;padding:6px 7px;border:1px solid var(--line);border-radius:6px}
.lines td.narrow{width:88px}.lines td.tiny{width:56px}
.lines td.desc{min-width:200px}.lines td.desc input{min-width:200px}
.lines td.dt{width:120px}.lines td.dt input{width:120px}
.sec-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--brand-dark);color:#fff;padding:12px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:200;font-size:14px}

/* ---------- Print document ---------- */
#printArea{display:none}
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{display:block;position:absolute;left:0;top:0;width:100%}
  @page{size:A4;margin:8mm}
}
.doc{font-family:'Times New Roman',serif;color:#000;padding:10px 4px;font-size:12px}
.doc .d-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #000;padding-bottom:8px}
.doc .d-co{font-size:18px;font-weight:bold}
.doc .d-sub{font-size:11px}
.doc .d-title{font-size:16px;font-weight:bold;letter-spacing:2px}
.doc .d-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 30px;margin:10px 0}
.doc .d-meta div{padding:2px 0;border-bottom:1px dotted #999}
.doc table{width:100%;border-collapse:collapse;margin-top:6px}
.doc table th,.doc table td{border:1px solid #000;padding:4px 6px;font-size:11px}
.doc table th{background:#eee}
.doc .sign{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:36px}
.doc .sign .s{ text-align:center}
.doc .sign .s .ln{border-top:1px solid #000;margin-top:30px;padding-top:3px;font-size:10px;text-transform:uppercase}
.doc .sign .s .nm{font-weight:bold;font-size:11px}
@media(max-width:760px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr}nav.tabs{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <form class="login-card" id="loginForm">
    <div id="loginLogo"></div>
    <div class="sub">RECEIVING &amp; ISSUE SLIP SYSTEM</div>
    <div class="field"><label>Email</label><input type="email" id="email" autocomplete="username" required></div>
    <div class="field"><label>Password</label><input type="password" id="password" autocomplete="current-password" required></div>
    <button class="btn" type="submit" id="loginBtn">Sign In</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="top">
    <div class="logo"><span id="hdrLogo" class="brand-logo-box"></span><span class="hdr-sub">IS-RR SYSTEM</span></div>
    <nav class="tabs" id="tabs">
      <button data-route="dashboard" class="active">Dashboard</button>
      <button data-route="rr">Receiving Reports</button>
      <button data-route="is">Issue Slips</button>
      <button data-route="inventory">Inventory</button>
      <button data-route="masters" data-admin>Masters</button>
      <button data-route="isform" data-admin>IS Form</button>
      <button data-route="users" data-admin>Users</button>
    </nav>
    <div class="userbox">
      <span id="who"></span><span class="role" id="roleTag"></span>
      <button class="iconbtn" id="logoutBtn">Logout</button>
    </div>
  </header>
  <main id="view"></main>
</div>

<div id="printArea"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
/* ====================== CONFIG ====================== */
const SUPABASE_URL = "https://emkcwukiqxnvcbhkjiqz.supabase.co";
const SUPABASE_KEY = "sb_publishable_u_qnmEI8oHI9Z_A0-Hht3Q_Yvaa7Ork";
const COMPANY = { name:"FOODSOLUTIONS INC.", addr:"Receiving & Issuance Management System" };
const COMPANY_LOGO_NAME="FOODSOLUTIONS ENTERPRISES INC.";
const LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 172" role="img" aria-label="FOODSOLUTIONS Enterprises INC."><text x="420" y="95" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="100" fill="#A21D23" textLength="812" lengthAdjust="spacingAndGlyphs">FOODSOLUTIONS</text><text x="420" y="150" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="300" font-size="46" fill="#2b2b2b" letter-spacing="1" textLength="296" lengthAdjust="spacingAndGlyphs">Enterprises INC.</text></svg>`;
function injectLogos(){ const h=document.getElementById('hdrLogo'); if(h) h.innerHTML=LOGO_SVG; const l=document.getElementById('loginLogo'); if(l) l.innerHTML=LOGO_SVG; }
const TXN_TYPES = ["PURCHASE","STOCK TRANSFER","RETURN","ADJUSTMENT","PRODUCTION"];
// Default Issue Slip calibration (pre-printed half-letter landscape 612x396 pt), seeded from MEATPLUS
const DEFAULT_SETTINGS = {
  font:"helvetica", fontSize:9, page:{w:612,h:396}, bgImage:null,
  calMap:{
    slip_no:{x:540,y:58},
    date:{x:86.6,y:75.8}, origin:{x:252,y:76.8},
    rowTop:118.9, rowHeight:26,
    cols:{item:30, brand:230, boxes:430, net:510, actual:590},
    sign:{ issued_by:{x:48,y:328.3}, transport:{x:180.9,y:328.3}, checker:{x:340.9,y:329.3}, received_by:{x:472.2,y:332.2} }
  }
};

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{ persistSession:true, autoRefreshToken:true }});
let ME = null;            // profile {id,email,full_name,role}
let CACHE = { suppliers:[], storages:[], items:[], brands:[] };
let SETTINGS = DEFAULT_SETTINGS;   // issue slip calibration, loaded from DB

/* ====================== HELPERS ====================== */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const fmt = n => (n==null||n==='')?'':Number(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});
const today = ()=> new Date().toISOString().slice(0,10);
function toast(msg){const t=el('div','toast',esc(msg));$('#toastRoot').appendChild(t);setTimeout(()=>t.remove(),2600);}
function can(action){ // simple role matrix
  const r=ME?.role||'encoder';
  const m={
    admin:['rr.write','is.write','delete','masters','users'],
    approver:['rr.write','is.write','delete'],
    encoder:['rr.write','is.write']
  };
  return (m[r]||[]).includes(action);
}
function isAdmin(){ return ME?.role==='admin'; }

/* ====================== AUTH ====================== */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'); btn.disabled=true; btn.textContent='Signing in…'; $('#loginErr').textContent='';
  const { data, error } = await sb.auth.signInWithPassword({ email:$('#email').value.trim(), password:$('#password').value });
  btn.disabled=false; btn.textContent='Sign In';
  if(error){ $('#loginErr').textContent = error.message; return; }
  await boot();
});
$('#logoutBtn').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

async function loadProfile(uid,email){
  let { data } = await sb.from('fsisrr_profiles').select('*').eq('id',uid).maybeSingle();
  if(!data){ // self-provision if trigger missed
    await sb.from('fsisrr_profiles').insert({id:uid,email,full_name:email,role:'encoder'});
    ({ data } = await sb.from('fsisrr_profiles').select('*').eq('id',uid).maybeSingle());
  }
  return data;
}

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $('#login').classList.remove('hidden'); $('#app').classList.add('hidden'); return; }
  ME = await loadProfile(session.user.id, session.user.email);
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  $('#who').textContent = ME.full_name || ME.email;
  $('#roleTag').textContent = ME.role;
  document.querySelectorAll('[data-admin]').forEach(b=> b.classList.toggle('hidden', !isAdmin()));
  await refreshCache();
  route('dashboard');
}

async function refreshCache(){
  const [s,st,it,br,se] = await Promise.all([
    sb.from('fsisrr_suppliers').select('*').order('name'),
    sb.from('fsisrr_storages').select('*').order('name'),
    sb.from('fsisrr_item_master').select('*').order('name'),
    sb.from('fsisrr_brand_master').select('*').order('name'),
    sb.from('fsisrr_issue_settings').select('config').eq('id',1).maybeSingle(),
  ]);
  CACHE.suppliers=s.data||[]; CACHE.storages=st.data||[]; CACHE.items=it.data||[]; CACHE.brands=br.data||[];
  if(se.data && se.data.config && se.data.config.calMap) SETTINGS = se.data.config;
}

/* ====================== ROUTER ====================== */
const tabs = $('#tabs');
tabs.addEventListener('click', e=>{ const b=e.target.closest('button[data-route]'); if(b) route(b.dataset.route); });
function setActive(r){ tabs.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.route===r)); }
function route(r){
  setActive(r);
  const v=$('#view'); v.innerHTML='';
  if(r==='dashboard') return renderDashboard(v);
  if(r==='rr') return renderRRList(v);
  if(r==='is') return renderISList(v);
  if(r==='inventory') return renderInventory(v);
  if(r==='masters') return renderMasters(v);
  if(r==='isform') return renderISForm(v);
  if(r==='users') return renderUsers(v);
}

/* ====================== DASHBOARD ====================== */
async function renderDashboard(v){
  v.innerHTML = `<div class="page-head"><h2>Dashboard</h2><div class="muted">${esc(today())}</div></div>
    <div class="cards" id="stats"></div>
    <div class="grid2">
      <div class="card"><h3>Recent Receiving Reports</h3><div id="recRR" class="table-wrap"></div></div>
      <div class="card"><h3>Recent Issue Slips</h3><div id="recIS" class="table-wrap"></div></div>
    </div>`;
  const [rrC,isC,inv,rr,is] = await Promise.all([
    sb.from('fsisrr_reports').select('id',{count:'exact',head:true}),
    sb.from('fsisrr_issue_slips').select('id',{count:'exact',head:true}),
    sb.from('fsisrr_inventory').select('*'),
    sb.from('fsisrr_reports').select('*').order('created_at',{ascending:false}).limit(6),
    sb.from('fsisrr_issue_slips').select('*').order('created_at',{ascending:false}).limit(6),
  ]);
  const invRows=inv.data||[];
  const lowStock=invRows.filter(r=>Number(r.wt_bal)<=0).length;
  const totWt=invRows.reduce((a,r)=>a+Number(r.wt_bal||0),0);
  $('#stats').innerHTML = `
    ${stat(rrC.count||0,'Receiving Reports')}
    ${stat(isC.count||0,'Issue Slips')}
    ${stat(invRows.length,'Stock Items')}
    ${stat(fmt(totWt)+' kg','Net Stock (wt)',true)}
    ${stat(lowStock,'Depleted Items',true)}`;
  const supMap=Object.fromEntries(CACHE.suppliers.map(s=>[s.id,s.name]));
  $('#recRR').innerHTML = miniTable(['RR Code','Date','Type','Supplier'],
    (rr.data||[]).map(r=>[`<b>${esc(r.rrcode||'-')}</b>`,esc(r.rr_date||''),`<span class="pill blue">${esc(r.transaction_type||'')}</span>`,esc(supMap[r.supplier_id]||'')]),
    'No receiving reports yet.');
  $('#recIS').innerHTML = miniTable(['IS Code','Date','Origin','Issued By'],
    (is.data||[]).map(r=>[`<b>${esc(r.is_code||'-')}</b>`,esc(r.is_date||''),esc(r.origin||''),esc(r.issued_by||'')]),
    'No issue slips yet.');
}
const stat=(n,l,accent)=>`<div class="stat ${accent?'accent':''}"><div class="n">${n}</div><div class="l">${l}</div></div>`;
function miniTable(cols,rows,empty){
  if(!rows.length) return `<div class="muted" style="padding:18px">${empty}</div>`;
  return `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${
    rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

/* ====================== RECEIVING REPORTS ====================== */
async function renderRRList(v){
  v.innerHTML = `<div class="page-head"><h2>Receiving Reports</h2>
    <div class="toolbar">
      <input class="search" id="rrSearch" placeholder="Search RR code / supplier / PO…">
      ${can('rr.write')?'<button class="btn sm accent" id="newRR">+ New Receiving Report</button>':''}
    </div></div>
    <div class="table-wrap"><table><thead><tr>
      <th>RR Code</th><th>Date</th><th>Type</th><th>Supplier</th><th>Storage</th><th>PO No</th>
      <th class="num">Boxes</th><th class="num">Net Wt</th><th></th></tr></thead>
      <tbody id="rrBody"><tr><td colspan="9" class="muted" style="padding:18px">Loading…</td></tr></tbody></table></div>`;
  if(can('rr.write')) $('#newRR').onclick=()=>openRRForm();
  const search=$('#rrSearch');
  let all=[];
  async function load(){
    const { data } = await sb.from('fsisrr_reports')
      .select('*, items:fsisrr_items(number_of_boxes,net_weight)').order('created_at',{ascending:false});
    all=data||[]; draw();
  }
  function draw(){
    const q=(search.value||'').toLowerCase();
    const supMap=Object.fromEntries(CACHE.suppliers.map(s=>[s.id,s.name]));
    const stMap=Object.fromEntries(CACHE.storages.map(s=>[s.id,s.name]));
    const rows=all.filter(r=>!q||[r.rrcode,supMap[r.supplier_id],r.po_no,r.transaction_type].join(' ').toLowerCase().includes(q));
    if(!rows.length){ $('#rrBody').innerHTML=`<tr><td colspan="9" class="muted" style="padding:18px">No receiving reports found.</td></tr>`; return; }
    $('#rrBody').innerHTML=rows.map(r=>{
      const boxes=(r.items||[]).reduce((a,i)=>a+Number(i.number_of_boxes||0),0);
      const wt=(r.items||[]).reduce((a,i)=>a+Number(i.net_weight||0),0);
      return `<tr>

function bindLineEvents(tb){
  tb.querySelectorAll('.rm').forEach(b=>b.onclick=()=>{ if(tb.children.length>1) b.closest('tr').remove(); });
  // Description -> auto-fill Brand (and Item Code on RR); clear auto-filled values when the description is removed
  tb.querySelectorAll('.li-item').forEach(inp=>{
    if(inp._brandBound) return; inp._brandBound=true;
    const row=inp.closest('tr');
    const br=row.querySelector('.li-brand');
    if(br && !br._manualBound){ br._manualBound=true; br.addEventListener('input',()=>{ br._auto=false; }); }
    const fill=()=>{
      const brEl=row.querySelector('.li-brand'); const codeEl=row.querySelector('.li-code');
      const name=inp.value.trim().toLowerCase();
      if(!name){ if(brEl&&brEl._auto){ brEl.value=''; brEl._auto=false; } if(codeEl&&codeEl._auto){ codeEl.value=''; codeEl._auto=false; } return; }
      const it=CACHE.items.find(x=>(x.name||'').toLowerCase()===name);
      if(it){ if(brEl && it.brand){ brEl.value=it.brand; brEl._auto=true; } if(codeEl && it.code){ codeEl.value=it.code; codeEl._auto=true; } }
    };
    inp.addEventListener('input',fill); inp.addEventListener('change',fill);
  });
  // Item Code -> auto-fill Description + Brand (RR only)
  tb.querySelectorAll('.li-code').forEach(inp=>{
    if(inp._codeBound) return; inp._codeBound=true;
    const fill=()=>{
      inp._auto=false;
      const row=inp.closest('tr');
      const code=inp.value.trim().toLowerCase(); if(!code) return;
      const it=CACHE.items.find(x=>(x.code||'').toLowerCase()===code);
      if(it){ const itemEl=row.querySelector('.li-item'); const brEl=row.querySelector('.li-brand');
        if(itemEl && it.name) itemEl.value=it.name;
        if(brEl && it.brand){ brEl.value=it.brand; brEl._auto=true; } }
    };
    inp.addEventListener('input',fill); inp.addEventListener('change',fill);
  });
}
function collectLines(m){
  const rows=[...m.querySelectorAll('#liBody tr')];
  const out=[];
  rows.forEach((r,i)=>{
    const g=s=>r.querySelector(s);
    const item=g('.li-item').value.trim();
    const wt=g('.li-wt').value, bx=g('.li-boxes').value;
    if(!item && !wt && !bx) return;
    out.push({ line_no:i+1, item, brand:g('.li-brand').value.trim()||null,
      item_code:g('.li-code').value.trim()||null, pallet_no:g('.li-pallet').value.trim()||null,
      number_of_boxes: bx===''?null:Number(bx), net_weight: wt===''?null:Number(wt),
      pd:g('.li-pd').value||null, ed:g('.li-ed').value||null, remarks:g('.li-rem').value.trim()||null });
  });
  return out;
}
// Resolve a master record by typed name; create it if new. Returns its id.
async function resolveMaster(table, cacheKey, name){
  name=(name||'').trim(); if(!name) return null;
  let m=CACHE[cacheKey].find(x=>(x.name||'').toLowerCase()===name.toLowerCase());
  if(!m){
    const { data } = await sb.from(table).insert({name}).select().single();
    if(data){ CACHE[cacheKey].push(data); m=data; }
  }
  return m ? m.id : null;
}
// Auto-create any new items/brands typed on the line items
async function ensureItemsBrands(lines){
  for(const l of lines){
    if(l.item && !CACHE.items.some(x=>(x.name||'').toLowerCase()===l.item.toLowerCase())){
      const { data } = await sb.from('fsisrr_item_master').insert({name:l.item, brand:l.brand||null}).select().single();
      if(data) CACHE.items.push(data);
    }
    if(l.brand && !CACHE.brands.some(x=>(x.name||'').toLowerCase()===l.brand.toLowerCase())){
      const { data } = await sb.from('fsisrr_brand_master').insert({name:l.brand}).select().single();
      if(data) CACHE.brands.push(data);
    }
  }
}
async function saveRR(m,rep){
  const btn=m.querySelector('#saveRR'); btn.disabled=true; btn.textContent='Saving…';
  const lines=collectLines(m);
  if(!lines.length){ toast('Add at least one line item'); btn.disabled=false; btn.textContent='Save Receiving Report'; return; }
  const date=m.querySelector('#f_date').value||today();
  const payload={
    rr_date:date, transaction_type:m.querySelector('#f_txn').value,
    supplier_id: await resolveMaster('fsisrr_suppliers','suppliers', m.querySelector('#f_supplier').value),
    storage_id: await resolveMaster('fsisrr_storages','storages', m.querySelector('#f_storage').value),
    cv_no:m.querySelector('#f_cv').value.trim()||null, po_no:m.querySelector('#f_po').value.trim()||null,
    note:m.querySelector('#f_note').value.trim()||null,
    prepared_by:m.querySelector('#f_prep').value.trim()||null, checked_by:m.querySelector('#f_check').value.trim()||null,
    verified_by:m.querySelector('#f_ver').value.trim()||null, noted_by:m.querySelector('#f_note_by').value.trim()||null,
    updated_at:new Date().toISOString()
  };
  try{
    let reportId;
    if(rep){
      reportId=rep.id;
      await sb.from('fsisrr_reports').update(payload).eq('id',reportId);
      await sb.from('fsisrr_items').delete().eq('report_id',reportId);
    }else{
      const enc=((ME.full_name||ME.email||'').trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4))||'XX';
      const { data:code, error:ce } = await sb.rpc('fsisrr_next_rr',{ p_date:date, p_enc:enc });
      if(ce) throw ce;
      payload.rrcode=code;
      const { data:ins, error } = await sb.from('fsisrr_reports').insert(payload).select('id').single();
      if(error) throw error; reportId=ins.id;
    }
    await ensureItemsBrands(lines);
    await sb.from('fsisrr_items').insert(lines.map(l=>({...l, report_id:reportId})));
    toast(rep?'Receiving report updated':'Receiving report saved');
    closeModal(); route('rr');
  }catch(err){ toast('Error: '+err.message); btn.disabled=false; btn.textContent='Save Receiving Report'; }
}

      .map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(',')));
    downloadFile('inventory_'+today()+'.csv', lines.join('\n'));
  };
}

function openImport(d){
  const cols=d.cols; const lbl=c=>(d.labels&&d.labels[c])||c;
  const order=cols.map(lbl).join('  ,  ');
  const ph = cols.length>1
    ? `${order}\n(columns separated by comma or tab)\nABC-001, BEEF BURGER PATTY 700G, GEN\nABC-002, PORK BELLY, PRIME`
    : `One per line\nPRIME MEATS TRADING\nGOLDEN HARVEST FOODS`;
  const body=`
    <p class="muted" style="margin-top:0">Import many ${esc(d.title)} at once. Paste rows (columns separated by <b>comma or tab</b>), or choose a CSV/Excel file. Column order: <b>${esc(order)}</b>. A header row is skipped automatically.</p>
    <div class="toolbar" style="margin-bottom:10px">
      <label class="btn sm ghost" for="impFile" style="display:inline-block">Choose CSV / Excel file</label>
      <input type="file" id="impFile" accept=".csv,.xlsx,.xls,text/csv" class="hidden">
      <span class="muted" id="impFileName"></span>
    </div>
    <textarea id="impText" style="width:100%;height:200px;padding:10px;border:1px solid var(--line);border-radius:8px;font-family:monospace;font-size:13px" placeholder="${esc(ph)}"></textarea>
    <div class="muted" id="impCount" style="margin-top:8px"></div>`;
  const m=modal('Import '+d.title, body, `<button class="btn sm gray" data-close>Cancel</button><button class="btn sm" id="impGo">Import</button>`);
  const ta=m.querySelector('#impText');
  const lines=t=>t.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  const splitRow=line=>line.split(/\t|,/).map(s=>s.trim());
  const isHeader=f=>/^(item\s*code|code|item\s*desc\w*|description|name|item|brand|supplier|storage|location)s?$/i.test((f[0]||'').trim());
  function parsed(){ let rows=lines(ta.value).map(splitRow); if(rows.length && isHeader(rows[0])) rows=rows.slice(1); return rows; }
  const nameIdx = cols.indexOf('name')>=0 ? cols.indexOf('name') : 0;
  const updateCount=()=>{ const n=parsed().filter(r=>(r[nameIdx]||'').trim()).length; m.querySelector('#impCount').textContent=n?(n+' record(s) ready to import'):''; };
  ta.oninput=updateCount;
  m.querySelector('#impFile').onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    m.querySelector('#impFileName').textContent=f.name;
    try{
      let rows=[];
      if(/\.(xlsx|xls)$/i.test(f.name) && window.XLSX){
        const buf=await f.arrayBuffer(); const wb=XLSX.read(buf,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1}).map(r=>(r||[]).map(c=>String(c==null?'':c).trim()));
      } else {
        const text=await f.text();
        rows=text.split(/\r?\n/).map(l=>splitRow(l));
      }
      rows=rows.filter(r=>r.some(c=>c&&c.length));
      const text=rows.map(r=>r.slice(0,cols.length).join(', ')).join('\n');
      ta.value=(ta.value.trim()?ta.value.trim()+'\n':'')+text;
      updateCount(); e.target.value='';
    }catch(err){ toast('Could not read file: '+err.message); }
  };
  m.querySelector('#impGo').onclick=async()=>{
    let rows=parsed();
    const seen=new Set(); const recs=[];
    rows.forEach(f=>{
      const rec={}; cols.forEach((c,i)=>{ const v=(f[i]||'').trim(); rec[c]=v||null; });
      const nm=(rec.name||'').toLowerCase(); if(!nm) return;
      if(seen.has(nm)) return; seen.add(nm); recs.push(rec);
    });
    if(!recs.length){ toast('Nothing to import'); return; }
    const { data:ex }=await sb.from(d.key).select('name');
    const exist=new Set((ex||[]).map(r=>(r.name||'').toLowerCase()));
    const toAdd=recs.filter(r=>!exist.has((r.name||'').toLowerCase()));
    if(!toAdd.length){ toast('All records already exist'); return; }
    const btn=m.querySelector('#impGo'); btn.disabled=true; btn.textContent='Importing…';
    const { error }=await sb.from(d.key).insert(toAdd);
    if(error){ toast('Error: '+error.message); btn.disabled=false; btn.textContent='Import'; return; }
    await refreshCache(); renderMasterCard(d); closeModal();
    const skipped=recs.length-toAdd.length;
    toast('Imported '+toAdd.length+' '+d.title+(skipped?(' ('+skipped+' duplicates skipped)'):''));
  };
  updateCount();
}

// Issue Slip prints as an OVERLAY onto pre-printed half-letter forms:
// only the field values are placed at calibrated coordinates (no form graphics).
function printIS(s){
  if(!(window.jspdf && window.jspdf.jsPDF)){ toast('PDF engine not loaded — check your connection'); return; }
  const cfg = (SETTINGS && SETTINGS.calMap) ? SETTINGS : DEFAULT_SETTINGS;
  const cm = cfg.calMap;
  const pw = (cfg.page&&cfg.page.w)||612, ph=(cfg.page&&cfg.page.h)||396;
  const doc = new window.jspdf.jsPDF({ unit:'pt', orientation:(pw>=ph?'landscape':'portrait'), format:[pw,ph] });
  doc.setFont(cfg.font||'helvetica','normal');
  doc.setFontSize(cfg.fontSize||9);
  const put=(p,t,align)=>{ if(!p||t==null||t==='')return; doc.text(String(t), p.x, p.y, align?{align:align}:undefined); };
  put(cm.date, s.is_date);
  put(cm.origin, s.origin);
  const items=(s.items||[]).sort((a,b)=>a.line_no-b.line_no);
  const top=cm.rowTop||118.9, rowH=cm.rowHeight||18, c=cm.cols||{};
  items.forEach((it,i)=>{
    const y=top + i*rowH;
    if(c.item!=null)   doc.text(String(it.item||''), c.item, y);
    if(c.brand!=null)  doc.text(String(it.brand||''), c.brand, y);
    if(c.boxes!=null && it.number_of_boxes!=null) doc.text(fmt(it.number_of_boxes), c.boxes, y, {align:'right'});
    if(c.net!=null && it.net_weight!=null)        doc.text(fmt(it.net_weight), c.net, y, {align:'right'});
    if(c.actual!=null && it.actual_weight!=null)  doc.text(fmt(it.actual_weight), c.actual, y, {align:'right'});
  });
  const sg=cm.sign||{};
  put(sg.issued_by, s.issued_by, 'center');
  put(sg.transport, s.transport, 'center');
  put(sg.checker, s.checker, 'center');
  put(sg.received_by, s.received_by, 'center');
  doc.autoPrint();
  window.open(doc.output('bloburl'), '_blank');
}

  v.innerHTML = `
    <div class="page-head"><h2>Print Calibration</h2></div>
    <p class="muted" style="margin:-6px 0 16px">Drag <b>every highlighted field</b> onto its place on the form — date, origin, each row's five columns, and the signatures. A column's left/right position and the row spacing apply to all rows automatically. Then Save.</p>
    <div class="grid2" style="margin-bottom:16px">
      <div class="fld"><label>Print font</label>
        <select id="calFont">
          <option value="helvetica">Helvetica / Arial</option>
          <option value="times">Times</option>
          <option value="courier">Courier</option>
        </select></div>
      <div class="grid2">
        <div class="fld"><label>Font size (pt)</label>
          <select id="calSize">${[7,8,9,10,11,12,14].map(n=>`<option>${n}</option>`).join('')}</select></div>
        <div class="fld"><label>Row spacing (pt)</label><input id="calRowH" type="number" step="any" value="${cm.rowHeight||26}"></div>
      </div>
    </div>
    <div class="card" style="padding:12px">
      <div id="calStage" style="position:relative;width:100%;background:#fff center/100% 100% no-repeat;border:1px solid var(--line);overflow:hidden"></div>
      <div id="calNoImg" style="text-align:center;padding:40px 20px;color:var(--muted)">
        <p style="margin:0 0 14px">Upload a <b>PDF or image</b> scan of your <b>blank Issue Slip form</b> to calibrate the fields on top of it.</p>
        <label class="btn sm" for="calFile" id="calUpload" style="display:inline-block">Upload form (PDF or image)</label>
      </div>
      <input type="file" id="calFile" accept="image/*,application/pdf,.pdf" class="hidden">
    </div>
    <div class="toolbar" style="justify-content:flex-end;margin-top:14px">
      <label class="btn sm gray" for="calFile" id="calReplace" style="display:inline-block">Change form image</label>
      <button class="btn sm gray" id="calReset">Reset all</button>
      <button class="btn sm ghost" id="calTest">Test print</button>
      <button class="btn sm gray" id="calClose">Close</button>
      <button class="btn sm" id="calSave">Save</button>
    </div>`;
  const stage=$('#calStage');
  $('#calFont').value=cfg.font||'helvetica';
  $('#calSize').value=String(cfg.fontSize||9);
  let scale=1;
  function fontFam(){ return cfg.font==='times'?'Georgia,serif':(cfg.font==='courier'?'monospace':'Arial,Helvetica,sans-serif'); }
  function getXY(k){ if(k.indexOf('sign.')===0) return cm.sign[k.slice(5)]||{x:50,y:330}; return cm[k]||{x:50,y:60}; }
  function setXY(k,x,y){ if(k.indexOf('sign.')===0) cm.sign[k.slice(5)]={x,y}; else cm[k]={x,y}; }
  function mkChip(text){ const c=document.createElement('div'); c.textContent=text;
    const fs=Math.max(8,(cfg.fontSize||9)*scale);
    c.style.cssText=`position:absolute;white-space:nowrap;cursor:move;background:#fde68a;border:1px solid #f59e0b;border-radius:3px;padding:0 3px;color:#1f2937;font:${fs}px ${fontFam()};touch-action:none;user-select:none;z-index:5;`;
    return c; }
  function placeChip(chip,x,y,align){ const w=chip.offsetWidth,h=chip.offsetHeight;
    let left=x*scale; if(align==='right') left-=w; else if(align==='center') left-=w/2;
    chip.style.left=Math.round(left)+'px'; chip.style.top=Math.round(y*scale-h+2)+'px'; }
  function drag(chip,onEnd,align){
    chip.addEventListener('pointerdown',e=>{
      e.preventDefault(); chip.setPointerCapture(e.pointerId);
      const sx=e.clientX, sy=e.clientY, ol=chip.offsetLeft, ot=chip.offsetTop;
      chip.style.zIndex=99; chip.style.boxShadow='0 4px 10px rgba(0,0,0,.3)';
      function mv(ev){ let nl=ol+(ev.clientX-sx), nt=ot+(ev.clientY-sy);
        nl=Math.max(0,Math.min(stage.clientWidth-chip.offsetWidth,nl));
        nt=Math.max(0,Math.min(stage.clientHeight-chip.offsetHeight,nt));
        chip.style.left=nl+'px'; chip.style.top=nt+'px'; }
      function up(ev){ chip.releasePointerCapture(e.pointerId);
        chip.removeEventListener('pointermove',mv); chip.removeEventListener('pointerup',up);
        const w=chip.offsetWidth,h=chip.offsetHeight;
        let ax=chip.offsetLeft; if(align==='right') ax+=w; else if(align==='center') ax+=w/2;
        const ay=chip.offsetTop+h-2;
        onEnd(ax/scale, ay/scale);
      }
      chip.addEventListener('pointermove',mv); chip.addEventListener('pointerup',up);
    });
  }
  function renderStage(){
    const hasImg=!!cfg.bgImage;
    $('#calNoImg').style.display=hasImg?'none':'block';
    $('#calReplace').style.display=hasImg?'inline-block':'none';
    stage.style.display=hasImg?'block':'none';
    if(!hasImg){ stage.innerHTML=''; return; }
    scale=(stage.clientWidth||800)/cfg.page.w;
    stage.style.height=(cfg.page.h*scale)+'px';
    stage.style.backgroundImage=`url(${cfg.bgImage})`;
    stage.innerHTML='';
    // header + signature chips
    [['date',SMP.date,'left'],['origin',SMP.origin,'left'],
     ['sign.issued_by',SMP.sign.issued_by,'center'],['sign.transport',SMP.sign.transport,'center'],
     ['sign.checker',SMP.sign.checker,'center'],['sign.received_by',SMP.sign.received_by,'center']
    ].forEach(([k,val,al])=>{
      const chip=mkChip(val); stage.appendChild(chip);
      const p=getXY(k); placeChip(chip,p.x,p.y,al);
      drag(chip,(ax,ay)=>{ setXY(k,ax,ay); renderStage(); }, al);
    });
    // every row's cells are draggable
    SMP.rows.forEach((r,i)=>{ COLS.forEach(([col,ci,al])=>{
      const chip=mkChip(r[ci]); stage.appendChild(chip);
      const x=(cm.cols[col]!=null?cm.cols[col]:30), y=cm.rowTop + i*(cm.rowHeight||26);
      placeChip(chip,x,y,al);
      drag(chip,(ax,ay)=>{
        cm.cols[col]=ax;
        if(i===0) cm.rowTop=ay; else cm.rowHeight=Math.max(6,(ay-cm.rowTop)/i);
        $('#calRowH').value=Math.round((cm.rowHeight||26)*10)/10;
        renderStage();
      }, al);
    }); });
  }
  function loadImage(file){
    const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=()=>{
      const maxW=1200, sc=Math.min(1,maxW/img.width);
      const cv=document.createElement('canvas'); cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cfg.bgImage=cv.toDataURL('image/jpeg',0.72); cfg.page={w:612,h:396}; renderStage();
    }; img.src=r.result; };
    r.readAsDataURL(file);
  }
  function loadPdf(file){
    if(!window.pdfjsLib){ toast('PDF engine not loaded — check your connection'); return; }
    toast('Rendering PDF…');
    const r=new FileReader();
    r.onload=()=>{
      pdfjsLib.getDocument({data:new Uint8Array(r.result)}).promise.then(pdf=>pdf.getPage(1)).then(page=>{
        const vp1=page.getViewport({scale:1});
        cfg.page={ w:Math.round(vp1.width), h:Math.round(vp1.height) };
        const rsc=Math.min(2.5, 1400/vp1.width);
        const vp=page.getViewport({scale:rsc});
        const cv=document.createElement('canvas'); cv.width=Math.round(vp.width); cv.height=Math.round(vp.height);
        return page.render({canvasContext:cv.getContext('2d'), viewport:vp}).promise.then(()=>{
          cfg.bgImage=cv.toDataURL('image/jpeg',0.82); renderStage();
        });
      }).catch(err=>toast('PDF error: '+err.message));
    };
    r.readAsArrayBuffer(file);
  }
  function loadFormFile(file){ if(!file) return; const isPdf=file.type==='application/pdf'||/\.pdf$/i.test(file.name); if(isPdf) loadPdf(file); else loadImage(file); }
  $('#calFile').onchange=e=>{ loadFormFile(e.target.files[0]); e.target.value=''; };
  // upload triggered natively by the <label for="calFile"> buttons
  $('#calFont').onchange=()=>{ cfg.font=$('#calFont').value; renderStage(); };
  $('#calSize').onchange=()=>{ cfg.fontSize=Number($('#calSize').value); renderStage(); };
  $('#calRowH').oninput=()=>{ cm.rowHeight=Number($('#calRowH').value)||26; renderStage(); };
  $('#calReset').onclick=()=>{ if(confirm('Reset all field positions to defaults? (Keeps your uploaded image.)')){ const img=cfg.bgImage; const d=JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); Object.assign(cfg,d); cfg.bgImage=img; renderISForm(v); } };
  $('#calClose').onclick=()=>route('dashboard');
  $('#calTest').onclick=()=>{
    const slip={ is_date:SMP.date, origin:SMP.origin,
      issued_by:SMP.sign.issued_by, transport:SMP.sign.transport, checker:SMP.sign.checker, received_by:SMP.sign.received_by,
      items:SMP.rows.map((r,i)=>({line_no:i+1,item:r[0],brand:r[1],number_of_boxes:+r[2],net_weight:+r[3],actual_weight:+r[4]})) };
    const prev=SETTINGS; SETTINGS=cfg; printIS(slip); SETTINGS=prev;
  };
  $('#calSave').onclick=async()=>{
    const btn=$('#calSave'); btn.disabled=true; btn.textContent='Saving…';
    const { error } = await sb.from('fsisrr_issue_settings').update({ config:cfg, updated_at:new Date().toISOString(), updated_by:ME.id }).eq('id',1);
    btn.disabled=false; btn.textContent='Save';
    if(error){ toast('Error: '+error.message); return; }
    SETTINGS=JSON.parse(JSON.stringify(cfg)); toast('Calibration saved');
  };
  setTimeout(renderStage,40);
}


/* ====================== START ====================== */
function showLogin(msg){ ME=null; const a=$('#app'), l=$('#login'); if(a)a.classList.add('hidden'); if(l)l.classList.remove('hidden'); if(msg)toast(msg); }
sb.auth.onAuthStateChange((event,session)=>{ if((event==='SIGNED_OUT' || !session) && ME){ showLogin('Session expired — please sign in again'); } });
injectLogos();
boot();
</script>
